services:
  zeronyx:
    image: ghcr.io/rainyroot/zeronyx:latest
    container_name: zeronyx
    ports:
      - "8742:8742"
    volumes:
      - zeronyx-data:/data
    environment:
      # Override defaults here if needed, e.g.:
      # ZERONYX_PORT: "8742"
      # ZERONYX_DATA_DIR: "/data"
    restart: unless-stopped

volumes:
  zeronyx-data:
