name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # -----------------------------------------------------------------------
  # Backend — Python type check + tests
  # -----------------------------------------------------------------------
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest -x -q --tb=short

  # -----------------------------------------------------------------------
  # Frontend — TypeScript type check + lint
  # -----------------------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit -p frontend/tsconfig.json || true
        # `|| true` until all pre-existing TS warnings are resolved

  # -----------------------------------------------------------------------
  # Build — Electron production build (Linux)
  # -----------------------------------------------------------------------
  build:
    name: Electron Build (Linux)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools (node-gyp needs distutils, removed in Python 3.12)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeronyx-linux
          path: dist/*.AppImage
          retention-days: 14
